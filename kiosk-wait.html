<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting GPC…</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin: 0 0 1rem; }
    p { color: #aaa; max-width: 28rem; line-height: 1.5; }
    .dot { display: inline-block; animation: pulse 1.2s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .err { color: #fbbf24; margin-top: 1.5rem; font-weight: 600; }
  </style>
</head>
<body>
  <div>
    <h1>Starting GPC<span class="dot">…</span></h1>
    <p id="msg">Waiting for the kiosk server on this PC.</p>
    <p id="detail" style="font-size:0.85rem;color:#666"></p>
    <p id="err" class="err" hidden></p>
  </div>
  <script>
    const params = new URLSearchParams(location.search)
    const kiosk = params.get('kiosk') || '1'
    const port = params.get('port') || '3001'
    const target = `http://127.0.0.1:${port}/?kiosk=${encodeURIComponent(kiosk)}`
    const maxAttempts = 90
    let attempt = 0

    document.getElementById('detail').textContent = target

    function check() {
      attempt++
      fetch(target, { method: 'GET', mode: 'no-cors', cache: 'no-store' })
        .then(() => { location.replace(target) })
        .catch(() => retry())
    }

    function retry() {
      if (attempt >= maxAttempts) {
        document.querySelector('.dot').hidden = true
        document.getElementById('msg').textContent = 'Server did not start on this PC.'
        document.getElementById('err').hidden = false
        document.getElementById('err').innerHTML =
          'Close this tab. On the Desktop run <strong>Start GPC Kiosk</strong> or <strong>GPC Kiosk ' + kiosk + '.bat</strong>.<br><br>' +
          'If it still fails: open the project folder, run <strong>install-windows.bat</strong>, then try again.<br><br>' +
          'Leave the minimized <strong>learno GPC Kiosk Server</strong> window open.'
        return
      }
      setTimeout(check, 2000)
    }

    setTimeout(check, 500)
  </script>
</body>
</html>
